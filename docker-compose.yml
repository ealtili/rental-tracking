services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rental-tracking-app:latest
    container_name: rental_tracking_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - db-data:/app/data
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY}
      - SMTP_ENCRYPTION_KEY=${SMTP_ENCRYPTION_KEY}
      - SMTP_ENCRYPTION_IV=${SMTP_ENCRYPTION_IV}
    security_opt:
      - no-new-privileges:true

volumes:
  db-data:
    name: rental_tracking_db_data
