services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rental-tracking-app:latest
    container_name: rental_tracking_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - db-data:/app/data
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DB_ENCRYPTION_KEY=6a3c8f8b8a928ef23214b7e8d9c2e4a8b8f8a92b2345e67d8a92b2345e67d8f9
      - SMTP_ENCRYPTION_KEY=a3c8f8b8a928ef23214b7e8d9c2e4a8b
      - SMTP_ENCRYPTION_IV=f7e8a92b2345e67d
    security_opt:
      - no-new-privileges:true

volumes:
  db-data:
    name: rental_tracking_db_data
